server:
  port: 9090

spring:
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:h2:file:./db/share-it-db
    username: root
    password: root
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true